name: Python Package Unit Tests

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        # If your dp_algo.py uses external libraries like numpy or geopandas, uncomment and add them below:
        # pip install numpy geopandas
        
    - name: Run automated tests
      run: |
        python -m pytest